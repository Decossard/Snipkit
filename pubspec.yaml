name: snipkit
description: Snip for snippets. Kit for keep in touch.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.1.0

  # Backend
  supabase_flutter: ^2.3.4

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # Local database
  sqflite: ^2.3.2
  path: ^1.9.0

  # Typography
  google_fonts: ^6.2.1

  # Icons
  lucide_icons: ^0.257.0

  # Media
  image_picker: ^1.0.7
  record: ^5.0.5
  just_audio: ^0.9.36
  cached_network_image: ^3.3.1

  # Animations
  flutter_animate: ^4.5.0

  # Utils
  uuid: ^4.3.3
  crypto: ^3.0.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
